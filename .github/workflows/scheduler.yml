name: ScrollCorner Auto Publisher

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Needed to commit published_urls.json back to repo

jobs:
  publish-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run news pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
        run: |
          python main.py

      - name: Save published URLs tracker
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published_urls.json
          git diff --staged --quiet || git commit -m "chore: update published URLs tracker [skip ci]"
          git push

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: last_run.json
