name: ScrollCorner Auto Publisher

on:
  schedule:
    - cron: '0 */3 * * *'
    - cron: '0 2 * * 0'  # Weekly cleanup: every Sunday at 2am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python main.py

      - name: Save published URLs tracker
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add published_urls.json
          git diff --staged --quiet || git commit -m "chore: update published URLs tracker [skip ci]"
          git push

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: last_run.json

  cleanup-old-articles:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * 0'

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: mystikemind/scrollcorner-site
          token: ${{ secrets.GH_PAT }}

      - name: Delete articles older than 7 days
        run: |
          python3 - <<'EOF'
          import os, json
          from datetime import datetime, timezone, timedelta

          cutoff = datetime.now(timezone.utc) - timedelta(days=7)
          content_dir = 'content'
          removed = 0

          for cat in os.listdir(content_dir):
              cat_dir = os.path.join(content_dir, cat)
              if not os.path.isdir(cat_dir):
                  continue
              for f in os.listdir(cat_dir):
                  if not f.endswith('.json'):
                      continue
                  path = os.path.join(cat_dir, f)
                  try:
                      with open(path) as fp:
                          d = json.load(fp)
                      date = datetime.fromisoformat(d.get('date', '').replace('Z', '+00:00'))
                      if date < cutoff:
                          os.remove(path)
                          removed += 1
                  except Exception:
                      pass

          print(f'Removed {removed} articles older than 7 days')
          EOF

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: remove articles older than 7 days [skip ci]"
          git push
